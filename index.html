<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Absensi Relawan Gesit Palembang</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-slate-400 font-medium text-sm">Menghubungkan ke Server...</p>
            </div>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Global Storage agar bisa diakses React
        window.FirebaseDB = { collection, addDoc, onSnapshot, query, orderBy, doc };
        
        // PENTING: Ganti isi di bawah ini dengan data dari Firebase Console Anda
        const firebaseConfig = {
            apiKey: "MASUKKAN_API_KEY_ANDA",
            authDomain: "PROYEK_ANDA.firebaseapp.com",
            projectId: "PROYEK_ANDA",
            storageBucket: "PROYEK_ANDA.appspot.com",
            messagingSenderId: "NOMOR_SENDER",
            appId: "ID_APLIKASI_ANDA"
        };

        // Gunakan config dari sistem jika ada, jika tidak gunakan config manual di atas
        const finalConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : firebaseConfig;

        try {
            const app = initializeApp(finalConfig);
            window.auth = getAuth(app);
            window.db = getFirestore(app);
            window.appId = window.__app_id || 'relawan-gesit-palembang';

            // Auto Login Anonim
            const startAuth = async () => {
                try {
                    if (window.__initial_auth_token) {
                        await signInWithCustomToken(window.auth, window.__initial_auth_token);
                    } else {
                        await signInAnonymously(window.auth);
                    }
                } catch (e) { console.warn("Menunggu koneksi Firebase..."); }
            };
            startAuth();
        } catch (err) {
            console.error("Firebase Error:", err);
        }
    </script>

    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ikon SVG Sederhana
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('form'); // 'form' atau 'admin'
            const [isAdmin, setIsAdmin] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(false);
            const [notif, setNotif] = useState(null);
            const [form, setForm] = useState({ nama: '', divisi: '', status: 'Hadir' });

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.auth) {
                        const unsub = window.auth.onAuthStateChanged(u => setUser(u));
                        clearInterval(check);
                        return () => unsub();
                    }
                }, 500);
                return () => clearInterval(check);
            }, []);

            useEffect(() => {
                if (!user || !isAdmin || !window.db) return;
                const { collection, onSnapshot } = window.FirebaseDB;
                const q = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'absensi');
                const unsub = onSnapshot(q, (s) => {
                    const docs = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    setRecords(docs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                });
                return () => unsub();
            }, [user, isAdmin]);

            const submitAbsen = async (e) => {
                e.preventDefault();
                if (!window.db || !user) return alert("Sistem belum siap. Tunggu 2 detik.");
                setLoading(true);
                try {
                    const { collection, addDoc } = window.FirebaseDB;
                    await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'absensi'), {
                        ...form,
                        timestamp: new Date().toISOString(),
                        uid: user.uid
                    });
                    setNotif("Berhasil Absen!");
                    setForm({ ...form, nama: '' });
                    setTimeout(() => setNotif(null), 3000);
                } catch (err) {
                    alert("Gagal mengirim data.");
                } finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="max-w-md w-full glass-card rounded-[2.5rem] shadow-2xl border border-white overflow-hidden animate-fade-in">
                        
                        {/* Header dengan Logo */}
                        <div className="p-8 pb-4 flex flex-col items-center bg-white">
                            <div className="w-full h-24 flex items-center justify-center mb-4">
                                <img 
                                    src="https://raw.githubusercontent.com/runnay/relawan-gesit/main/logo.png" 
                                    alt="Logo Relawan Gesit"
                                    className="max-h-full object-contain"
                                    onError={(e) => e.target.src = 'https://via.placeholder.com/150x80?text=RELAWAN+GESIT'}
                                />
                            </div>
                            <div className="h-1 w-10 bg-pink-500 rounded-full"></div>
                        </div>

                        {view === 'form' ? (
                            <div className="p-8 pt-2">
                                <h2 className="text-center font-black text-slate-800 tracking-tighter text-2xl mb-8">ABSENSI HARIAN</h2>
                                <form onSubmit={submitAbsen} className="space-y-4">
                                    <input 
                                        type="text" required placeholder="Nama Lengkap Anda"
                                        className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-pink-500 transition-all font-semibold text-slate-700"
                                        value={form.nama}
                                        onChange={e => setForm({...form, nama: e.target.value})}
                                    />
                                    <select 
                                        required className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-pink-500 font-semibold text-slate-600"
                                        value={form.divisi}
                                        onChange={e => setForm({...form, divisi: e.target.value})}
                                    >
                                        <option value="">-- Pilih Divisi --</option>
                                        <option value="Media">Media & Kreatif</option>
                                        <option value="Program">Program Sosial</option>
                                        <option value="Fundraising">Fundraising</option>
                                        <option value="PSDM">PSDM</option>
                                    </select>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['Hadir', 'Izin', 'Sakit'].map(s => (
                                            <button 
                                                key={s} type="button"
                                                className={`py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all ${form.status === s ? 'bg-pink-500 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}
                                                onClick={() => setForm({...form, status: s})}
                                            >
                                                {s}
                                            </button>
                                        ))}
                                    </div>
                                    <button disabled={loading} className="w-full bg-slate-900 text-white font-extrabold py-5 rounded-2xl hover:bg-pink-600 transition-all shadow-xl text-sm uppercase tracking-[0.2em] mt-4">
                                        {loading ? 'Mengirim...' : 'Kirim Kehadiran'}
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <div className="p-8 pt-4">
                                {!isAdmin ? (
                                    <div className="text-center py-10 space-y-4">
                                        <div className="text-pink-500 flex justify-center"><IconLock /></div>
                                        <h3 className="font-bold text-slate-800">Akses Terbatas</h3>
                                        <input 
                                            type="password" placeholder="Kode Akses"
                                            className="w-full p-4 border rounded-2xl text-center outline-none focus:ring-2 focus:ring-pink-500 bg-slate-50 font-bold"
                                            value={passInput}
                                            onChange={e => setPassInput(e.target.value)}
                                        />
                                        <button 
                                            onClick={() => passInput === 'rgpalembang123@' ? setIsAdmin(true) : alert("Salah!")}
                                            className="w-full bg-pink-500 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest"
                                        >
                                            Buka Rekap
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-center">
                                            <button onClick={() => setView('form')} className="text-[10px] font-bold text-slate-400 uppercase tracking-widest"> Kembali</button>
                                            <span className="text-[10px] bg-slate-100 px-3 py-1 rounded-full font-bold text-slate-500 uppercase">Admin Dashboard</span>
                                        </div>
                                        <div className="max-h-[350px] overflow-y-auto space-y-2 pr-1 scrollbar-hide">
                                            {records.map(r => (
                                                <div key={r.id} className="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between items-center">
                                                    <div>
                                                        <div className="text-xs font-bold text-slate-700">{r.nama}</div>
                                                        <div className="text-[8px] font-bold text-slate-400 uppercase">{r.divisi}</div>
                                                    </div>
                                                    <span className={`text-[8px] px-2 py-1 rounded-full font-black uppercase ${r.status === 'Hadir' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                        {r.status}
                                                    </span>
                                                </div>
                                            ))}
                                            {records.length === 0 && <div className="text-center text-[10px] text-slate-300 py-10 uppercase font-bold tracking-widest">Belum ada data</div>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="p-5 bg-slate-50 border-t flex justify-center">
                            <button onClick={() => setView(view === 'form' ? 'admin' : 'form')} className="text-[9px] font-bold text-slate-300 uppercase tracking-widest flex items-center gap-2 hover:text-pink-500 transition-colors">
                                <IconLock /> {view === 'form' ? 'Panel Admin' : 'Ke Halaman Absen'}
                            </button>
                        </div>

                        {notif && (
                            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-64 px-4 animate-bounce">
                                <div className="bg-slate-900 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-pink-500">
                                    <div className="bg-pink-500 p-1 rounded-full"><IconCheck /></div>
                                    <span className="text-[10px] font-bold uppercase tracking-tight">{notif}</span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
