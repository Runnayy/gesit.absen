<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Absensi Relawan Gesit Palembang</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <!-- Firebase Module Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Ekspos Firebase ke window agar bisa diakses oleh skrip Babel (React)
        window.FirebaseDB = { collection, addDoc, onSnapshot, query, orderBy, doc };
        
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.db = db;
        window.auth = auth;
        window.appId = window.__app_id || 'gesit-palembang-123';

        const initAuth = async () => {
            try {
                if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                    await signInWithCustomToken(auth, window.__initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
            }
        };
        initAuth();
    </script>

    <!-- React Application -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Ikon SVG Manual
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('form');
            const [isAdminAuth, setIsAdminAuth] = useState(false);
            const [passcode, setPasscode] = useState('');
            const [loading, setLoading] = useState(false);
            const [statusMsg, setStatusMsg] = useState({ show: false, text: '', type: '' });
            const [records, setRecords] = useState([]);
            const [formData, setFormData] = useState({
                nama: '', divisi: '', status: 'Hadir'
            });

            useEffect(() => {
                const unsubscribe = window.auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !isAdminAuth) return;
                const { collection, onSnapshot } = window.FirebaseDB;
                const absensiRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'absensi');
                
                const unsubscribe = onSnapshot(absensiRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setRecords(data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                }, (error) => console.error("Firestore Error:", error));
                
                return () => unsubscribe();
            }, [user, isAdminAuth]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                setLoading(true);
                try {
                    const { collection, addDoc } = window.FirebaseDB;
                    await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'absensi'), {
                        ...formData,
                        timestamp: new Date().toISOString(),
                        userId: user.uid
                    });
                    setStatusMsg({ show: true, text: 'Presensi Berhasil!', type: 'success' });
                    setFormData({ ...formData, nama: '' });
                    setTimeout(() => setStatusMsg({ show: false, text: '', type: '' }), 3000);
                } catch (err) {
                    console.error(err);
                    setStatusMsg({ show: true, text: 'Gagal mengirim data.', type: 'error' });
                } finally { setLoading(false); }
            };

            const stats = {
                total: records.length,
                hadir: records.filter(r => r.status === 'Hadir').length,
                lainnya: records.filter(r => r.status !== 'Hadir').length,
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-lg w-full bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-200 relative animate-fade-in">
                        
                        {/* Header Section */}
                        <div className="bg-gradient-to-br from-[#ff3d5d] to-[#e6193c] p-10 text-white text-center">
                            <h1 className="text-2xl font-extrabold uppercase tracking-tight">Relawan Gesit</h1>
                            <p className="text-pink-100 text-sm opacity-90 font-medium tracking-wide">Regional Palembang</p>
                        </div>

                        {view === 'form' ? (
                            <div className="p-8">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        <div className="h-6 w-1 bg-pink-500 rounded-full"></div>
                                        Presensi Kehadiran
                                    </h2>
                                    <span className="text-[10px] bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-bold uppercase tracking-widest">Live</span>
                                </div>
                                
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Nama Lengkap</label>
                                        <input 
                                            type="text" required placeholder="Masukkan nama Anda"
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-pink-500 transition-all"
                                            value={formData.nama}
                                            onChange={e => setFormData({...formData, nama: e.target.value})}
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Divisi</label>
                                        <select 
                                            required className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-pink-500 transition-all appearance-none"
                                            value={formData.divisi}
                                            onChange={e => setFormData({...formData, divisi: e.target.value})}
                                        >
                                            <option value="">Pilih Divisi Anda</option>
                                            <option value="Media">Media</option>
                                            <option value="Program">Program</option>
                                            <option value="Fundraising">Fundraising</option>
                                            <option value="PSDM">PSDM</option>
                                            <option value="Lainnya">Lainnya</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Status</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {['Hadir', 'Izin', 'Sakit'].map(s => (
                                                <button 
                                                    key={s} type="button"
                                                    className={`py-3 rounded-xl font-bold text-xs transition-all ${formData.status === s ? 'bg-pink-500 text-white shadow-lg shadow-pink-200' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}
                                                    onClick={() => setFormData({...formData, status: s})}
                                                >
                                                    {s}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <button 
                                        disabled={loading || !user}
                                        className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-all disabled:opacity-50 shadow-xl mt-4"
                                    >
                                        {loading ? 'Sistem Memproses...' : 'Kirim Data Presensi'}
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <div className="p-8">
                                {!isAdminAuth ? (
                                    <div className="text-center space-y-4 py-10 animate-fade-in">
                                        <div className="flex justify-center text-pink-500"><IconLock /></div>
                                        <h2 className="text-xl font-bold text-slate-800">Akses Administrator</h2>
                                        <p className="text-xs text-slate-400">Masukkan kode akses untuk melihat rekap data</p>
                                        <input 
                                            type="password" placeholder="Kode Akses"
                                            className="w-full p-4 border rounded-2xl text-center tracking-[0.5em] outline-none focus:ring-2 focus:ring-pink-500 bg-slate-50"
                                            value={passcode}
                                            onChange={e => setPasscode(e.target.value)}
                                        />
                                        <button 
                                            onClick={() => passcode === 'rgpalembang123@' ? setIsAdminAuth(true) : alert("Kode akses salah!")}
                                            className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold hover:bg-pink-600 transition-colors shadow-lg shadow-pink-100"
                                        >
                                            Masuk Dashboard
                                        </button>
                                        <button onClick={() => setView('form')} className="text-[10px] font-bold text-slate-300 uppercase">Batalkan</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4 animate-fade-in">
                                        <div className="flex justify-between items-center">
                                            <button onClick={() => setView('form')} className="text-xs font-bold text-slate-400 flex items-center gap-1 hover:text-pink-500 transition-colors">
                                                <IconArrowLeft /> Kembali
                                            </button>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Admin Mode</span>
                                        </div>
                                        
                                        <div className="grid grid-cols-3 gap-2 text-center">
                                            <div className="bg-slate-900 text-white p-3 rounded-2xl shadow-lg"><div className="text-xl font-black">{stats.total}</div><div className="text-[8px] uppercase font-bold opacity-60">Total</div></div>
                                            <div className="bg-emerald-50 text-emerald-600 p-3 rounded-2xl border border-emerald-100"><div className="text-xl font-black">{stats.hadir}</div><div className="text-[8px] uppercase font-bold">Hadir</div></div>
                                            <div className="bg-rose-50 text-rose-600 p-3 rounded-2xl border border-rose-100"><div className="text-xl font-black">{stats.lainnya}</div><div className="text-[8px] uppercase font-bold">Lainnya</div></div>
                                        </div>
                                        
                                        <div className="max-h-[350px] overflow-y-auto space-y-2 scrollbar-hide pr-1">
                                            {records.length === 0 ? (
                                                <div className="text-center py-10 text-slate-300 text-xs font-medium">Belum ada data masuk</div>
                                            ) : (
                                                records.map(r => (
                                                    <div key={r.id} className="p-4 bg-slate-50 rounded-2xl flex justify-between items-center border border-slate-100 hover:border-pink-100 transition-colors">
                                                        <div className="flex flex-col">
                                                            <span className="text-sm font-bold text-slate-700">{r.nama}</span>
                                                            <div className="flex items-center gap-2 mt-1">
                                                                <span className="text-[9px] bg-white border border-slate-200 px-2 py-0.5 rounded-full text-slate-400 font-bold uppercase">{r.divisi}</span>
                                                                <span className="text-[9px] text-slate-300 font-medium">{new Date(r.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                                            </div>
                                                        </div>
                                                        <div className={`text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-tighter ${r.status === 'Hadir' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                            {r.status}
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Footer Toggle */}
                        <div className="p-6 bg-slate-50 border-t flex justify-center">
                            <button 
                                onClick={() => {
                                    if(view === 'form') { setView('admin'); }
                                    else { setView('form'); }
                                }} 
                                className="text-[10px] font-bold text-slate-300 uppercase tracking-[0.2em] flex items-center gap-2 hover:text-pink-500 transition-all"
                            >
                                <IconLock /> {view === 'form' ? 'Akses Panel Admin' : 'Ke Halaman Absen'}
                            </button>
                        </div>

                        {/* Floating Notification */}
                        {statusMsg.show && (
                            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 max-w-xs w-full px-4 z-50">
                                <div className={`p-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce border ${statusMsg.type === 'success' ? 'bg-emerald-600 border-emerald-500 text-white' : 'bg-rose-600 border-rose-500 text-white'}`}>
                                    <div className="bg-white/20 p-1 rounded-full"><IconCheck /></div>
                                    <span className="text-xs font-bold">{statusMsg.text}</span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
