<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Absensi Relawan Gesit Palembang</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .glass-header { background: linear-gradient(135deg, #ff3d5d 0%, #e6193c 100%); }
    </style>
</head>
<body>
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-slate-400 font-bold text-sm tracking-widest animate-pulse">MEMUAT SISTEM...</p>
            </div>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        window.FirebaseDB = { collection, addDoc, onSnapshot, query, orderBy, doc };
        
        // Konfigurasi Firebase (Akan diisi otomatis oleh environment atau isi manual jika di luar canvas)
        const firebaseConfig = {
            apiKey: "", 
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const finalConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : firebaseConfig;

        try {
            const app = initializeApp(finalConfig);
            window.auth = getAuth(app);
            window.db = getFirestore(app);
            window.appId = window.__app_id || 'relawan-gesit-plbg-v1';

            const login = async () => {
                try {
                    if (window.__initial_auth_token) {
                        await signInWithCustomToken(window.auth, window.__initial_auth_token);
                    } else {
                        await signInAnonymously(window.auth);
                    }
                } catch (e) { console.warn("Firebase Auth: Menggunakan mode akses publik."); }
            };
            login();
        } catch (err) {
            console.error("Firebase Initialization Error:", err);
        }
    </script>

    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        /** * PENTING: Masukkan URL Google Apps Script Anda di sini untuk sinkronisasi otomatis ke Spreadsheet
         */
        const GOOGLE_SHEETS_WEB_URL = ""; 

        // Icons
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
        const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('form'); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(false);
            const [notif, setNotif] = useState(null);
            const [aiMessage, setAiMessage] = useState('');
            const [aiSummary, setAiSummary] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isSummaryLoading, setIsSummaryLoading] = useState(false);
            const [form, setForm] = useState({ nama: '', divisi: '', status: 'Hadir' });

            const apiKey = ""; // API Key Gemini

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.auth) {
                        const unsub = window.auth.onAuthStateChanged(u => setUser(u));
                        clearInterval(interval);
                        return () => unsub();
                    }
                }, 500);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (!user || !isAdmin || !window.db) return;
                const { collection, onSnapshot } = window.FirebaseDB;
                const path = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'absensi');
                
                const unsub = onSnapshot(path, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setRecords(data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                }, (error) => console.error("Firestore error:", error));
                
                return () => unsub();
            }, [user, isAdmin]);

            // Fungsi Sinkronisasi ke Google Sheets
            const syncToGoogleSheets = async (data) => {
                if (!GOOGLE_SHEETS_WEB_URL) return;
                try {
                    await fetch(GOOGLE_SHEETS_WEB_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } catch (e) { console.error("Sheet Sync Error:", e); }
            };

            const generateAiMotivation = async (nama, divisi) => {
                setIsAiLoading(true);
                const prompt = `Berikan satu kalimat motivasi kerelawanan singkat untuk ${nama} dari divisi ${divisi} Relawan Gesit Palembang. Tanpa tanda kutip, maks 15 kata.`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "Anda adalah motivator ceria Relawan Gesit Palembang." }] }
                        })
                    });
                    const result = await response.json();
                    setAiMessage(result.candidates?.[0]?.content?.parts?.[0]?.text || "Terus semangat menebar manfaat!");
                } catch (err) { setAiMessage("Semangat menebar kebaikan hari ini!"); } finally { setIsAiLoading(false); }
            };

            const generateAiSummary = async () => {
                if (records.length === 0) return;
                setIsSummaryLoading(true);
                const dataContext = records.slice(0, 20).map(r => `${r.nama} (${r.divisi}): ${r.status}`).join(", ");
                const prompt = `Analisis data absensi: ${dataContext}. Berikan ringkasan 3 poin: divisi paling aktif, persentase hadir, dan saran peningkatan semangat.`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const result = await response.json();
                    setAiSummary(result.candidates?.[0]?.content?.parts?.[0]?.text);
                } catch (err) { setAiSummary("Gagal memuat ringkasan otomatis."); } finally { setIsSummaryLoading(false); }
            };

            const exportToCSV = () => {
                if (records.length === 0) return;
                const headers = ["Waktu", "Nama", "Divisi", "Status"];
                const rows = records.map(r => [new Date(r.timestamp).toLocaleString('id-ID'), r.nama, r.divisi, r.status]);
                let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `Absensi_RG_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!window.db || !user) return;
                setLoading(true);
                setAiMessage('');
                const payload = { ...form, timestamp: new Date().toISOString(), uid: user.uid };
                try {
                    const { collection, addDoc } = window.FirebaseDB;
                    await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'absensi'), payload);
                    syncToGoogleSheets(payload); // Kirim ke Spreadsheet
                    setNotif("Absensi Terkirim!");
                    await generateAiMotivation(form.nama, form.divisi);
                    setForm({ ...form, nama: '', status: 'Hadir' });
                    setTimeout(() => setNotif(null), 3000);
                } catch (err) { alert("Gagal mengirim."); } finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200 relative animate-fade-in">
                        
                        <div className="glass-header p-10 text-white text-center relative">
                            <h1 className="text-2xl font-black uppercase tracking-tighter italic">Relawan Gesit</h1>
                            <p className="text-[10px] uppercase font-bold tracking-[0.3em] opacity-80">Regional Palembang</p>
                            <div className="absolute -bottom-6 left-1/2 -translate-x-1/2 w-12 h-12 bg-white rounded-2xl rotate-45 shadow-lg flex items-center justify-center">
                                <div className="w-2 h-2 bg-pink-500 rounded-full animate-ping"></div>
                            </div>
                        </div>

                        {view === 'form' ? (
                            <div className="p-8 pt-12">
                                <div className="text-center mb-8">
                                    <h2 className="text-xl font-black text-slate-800 tracking-tight uppercase">Absensi Harian</h2>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 italic">Satu aksi, seribu manfaat</p>
                                </div>
                                
                                {aiMessage && (
                                    <div className="mb-6 p-4 bg-pink-50 border border-pink-100 rounded-2xl animate-fade-in">
                                        <div className="flex items-center gap-2 mb-1 text-pink-600">
                                            <IconSparkles />
                                            <span className="text-[9px] font-black uppercase tracking-wider">AI Motivation ✨</span>
                                        </div>
                                        <p className="text-[11px] font-bold text-slate-700 italic">"{aiMessage}"</p>
                                    </div>
                                )}

                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">Nama Lengkap</label>
                                        <input 
                                            type="text" required placeholder="Masukkan nama..."
                                            className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-pink-500 font-bold text-slate-700 text-sm"
                                            value={form.nama} onChange={e => setForm({...form, nama: e.target.value})}
                                        />
                                    </div>
                                    
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">Divisi</label>
                                        <select 
                                            required className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-pink-500 font-bold text-slate-600 appearance-none text-sm"
                                            value={form.divisi} onChange={e => setForm({...form, divisi: e.target.value})}
                                        >
                                            <option value="">-- Pilih Divisi --</option>
                                            <option value="Inti">Inti</option>
                                            <option value="Media">Media</option>
                                            <option value="Program">Program</option>
                                            <option value="PSDM">PSDM</option>
                                            <option value="Fundraising">Fundraising</option>
                                            <option value="General">General</option>
                                        </select>
                                    </div>

                                    <div className="grid grid-cols-3 gap-2 py-2">
                                        {['Hadir', 'Izin', 'Sakit'].map(s => (
                                            <button 
                                                key={s} type="button"
                                                className={`py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all ${form.status === s ? 'bg-slate-900 text-white shadow-xl' : 'bg-slate-100 text-slate-400'}`}
                                                onClick={() => setForm({...form, status: s})}
                                            >
                                                {s}
                                            </button>
                                        ))}
                                    </div>

                                    <button disabled={loading || isAiLoading} className="w-full bg-pink-500 text-white font-black py-5 rounded-2xl hover:bg-pink-600 transition-all shadow-xl shadow-pink-100 text-xs uppercase tracking-[0.2em] mt-4 flex items-center justify-center gap-2">
                                        {loading || isAiLoading ? 'MEMPROSES...' : <>SUBMIT PRESENSI <IconSparkles /></>}
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <div className="p-8 pt-12">
                                {!isAdmin ? (
                                    <div className="text-center py-6 animate-fade-in">
                                        <div className="w-16 h-16 bg-slate-100 rounded-3xl flex items-center justify-center mx-auto mb-4 text-slate-400"><IconLock /></div>
                                        <h2 className="font-black text-slate-800 mb-2 uppercase">Akses Admin</h2>
                                        <input 
                                            type="password" placeholder="Passcode"
                                            className="w-full p-4 border-2 border-slate-100 rounded-2xl text-center bg-slate-50 font-black tracking-[0.5em]"
                                            value={passInput} onChange={e => setPassInput(e.target.value)}
                                        />
                                        <button 
                                            onClick={() => passInput === 'rgpalembang123@' ? setIsAdmin(true) : alert("Salah!")}
                                            className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest mt-4"
                                        >
                                            MASUK DASHBOARD
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-6 animate-fade-in">
                                        <div className="flex justify-between items-center">
                                            <button onClick={() => setView('form')} className="p-2 bg-slate-100 rounded-xl text-slate-500"><IconArrowLeft /></button>
                                            <button onClick={exportToCSV} className="flex items-center gap-2 bg-emerald-500 text-white px-4 py-2 rounded-xl font-black text-[9px] uppercase tracking-widest shadow-lg">
                                                <IconDownload /> EXPORT CSV
                                            </button>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-slate-900 p-4 rounded-3xl text-center text-white">
                                                <div className="text-2xl font-black">{records.length}</div>
                                                <div className="text-[8px] font-bold uppercase opacity-50">Total Record</div>
                                            </div>
                                            <div className="bg-pink-500 p-4 rounded-3xl text-center text-white">
                                                <div className="text-2xl font-black">{records.filter(r => r.status === 'Hadir').length}</div>
                                                <div className="text-[8px] font-bold uppercase opacity-50">Hadir</div>
                                            </div>
                                        </div>

                                        <div className="bg-indigo-600 p-5 rounded-[2rem] text-white shadow-xl relative">
                                            <div className="flex items-center justify-between mb-3">
                                                <div className="flex items-center gap-2"><IconChart /><span className="text-[10px] font-black uppercase">AI Summary</span></div>
                                                <button disabled={isSummaryLoading} onClick={generateAiSummary} className="bg-white/20 p-2 rounded-xl"><IconSparkles /></button>
                                            </div>
                                            <div className="text-[11px] leading-relaxed opacity-90 italic">
                                                {isSummaryLoading ? "Menganalisis..." : (aiSummary || "Klik bintang untuk ringkasan AI.")}
                                            </div>
                                        </div>

                                        <div className="max-h-[220px] overflow-y-auto space-y-2 pr-1 scrollbar-hide">
                                            {records.map(r => (
                                                <div key={r.id} className="p-4 bg-slate-50 rounded-2xl border flex justify-between items-center">
                                                    <div>
                                                        <div className="text-xs font-black text-slate-700 uppercase">{r.nama}</div>
                                                        <div className="text-[8px] font-bold text-slate-400">{r.divisi} • {new Date(r.timestamp).toLocaleTimeString('id-ID')}</div>
                                                    </div>
                                                    <span className={`text-[8px] px-3 py-1 rounded-full font-black uppercase ${r.status === 'Hadir' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                        {r.status}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="p-6 bg-slate-50 border-t flex justify-center items-center">
                            <button onClick={() => setView(view === 'form' ? 'admin' : 'form')} className="text-[9px] font-black text-slate-300 uppercase flex items-center gap-2 hover:text-pink-500 transition-all">
                                <IconLock /> {view === 'form' ? 'ADMIN PANEL' : 'HALAMAN DEPAN'}
                            </button>
                        </div>

                        {notif && (
                            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-64 z-50 animate-bounce">
                                <div className="bg-slate-900 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-pink-500/30">
                                    <div className="bg-pink-500 p-1.5 rounded-full"><IconCheck /></div>
                                    <span className="text-[10px] font-bold uppercase tracking-widest">{notif}</span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
